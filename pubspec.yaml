name: expense_tracker_ar
description: متتبع المصروفات الشهرية - Arabic Monthly Expense Tracker
publish_to: 'none'
version: 4.0.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management
  provider: ^6.0.5

  # Charts
  fl_chart: ^0.63.0

  # UI & fonts
  google_fonts: ^4.0.4

  # Utils
  intl: ^0.20.2
  uuid: ^3.0.7

  # Auth (local)
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0

  # Notifications - pinned to version compatible with Dart 3.9.x
  flutter_local_notifications: ^16.3.3
  timezone: ^0.9.4

  # Export / Share
  share_plus: ^7.2.2
  path_provider: ^2.1.3

  # Crypto for hashing passwords locally
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
